services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: fail2ban-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - /var/log/nginx:/host/nginx:ro
      - /var/log/fail2ban.log:/host/fail2ban.log:ro
      - /etc/nginx/fail2ban_blocked.conf:/host/fail2ban_blocked.conf
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: fail2ban-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - backend
